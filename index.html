  <style>
    :root {
      --bg: #0a0a0a; --surface: #131313; --surface2: #1a1a1a; --border: #222;
      --text: #e8e8e8; --muted: #888; --dim: #555; --accent: #d4a843; --accent-dim: #9a7a30;
      --tag-bg: #181818; --hover: #161616;
    }
    [data-theme="light"] {
      --bg: #f5f5f0; --surface: #eeeee8; --surface2: #e5e5df; --border: #d0d0c8;
      --text: #1a1a1a; --muted: #666; --dim: #999; --accent: #b08820; --accent-dim: #8a6a18;
      --tag-bg: #e8e8e0; --hover: #eaeae2;
    }
    .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.1rem; padding: 0; line-height: 1; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent); }

    .header { border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; color: var(--accent); letter-spacing: 0.02em; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .updated { font-size: 0.7rem; color: var(--dim); font-family: monospace; }

    .sticky-nav { position: sticky; top: 0; z-index: 100; background: var(--bg); }
    .search-bar { padding: 0.6rem 1.2rem; display: flex; align-items: center; border-bottom: 1px solid var(--border); background: var(--surface); }
    .search-input { flex: 1; background: none; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none; padding: 0.4rem 0; }
    .search-input::placeholder { color: var(--dim); }
    .search-icon { color: var(--dim); margin-right: 0.6rem; font-size: 0.9rem; }
    .search-clear { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 1rem; padding: 0.3rem 0.4rem; line-height: 1; border-radius: 50%; transition: color 0.15s; }
    .search-clear:hover { color: var(--text); }

    .date-filters { padding: 0.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.4rem; background: var(--surface); }
    .date-pills { display: flex; gap: 0.4rem; overflow-x: auto; scrollbar-width: none; }
    .date-pills::-webkit-scrollbar { display: none; }
    .date-pill { background: var(--tag-bg); border: 1px solid var(--border); border-radius: 999px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 500; padding: 0.3rem 0.75rem; white-space: nowrap; transition: all 0.2s; }
    .date-pill:hover { color: var(--text); border-color: var(--dim); }
    .date-pill.active { background: rgba(212,168,67,0.15); border-color: var(--accent-dim); color: var(--accent); }
    .sort-group { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; flex-shrink: 0; padding-left: 0.75rem; border-left: 1px solid var(--border); }
    .sort-label { font-size: 0.62rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
    .venue-label { font-size: 0.62rem; color: var(--dim); background: var(--tag-bg); padding: 0.1rem 0.4rem; border-radius: 3px; white-space: nowrap; }
    .flat-events { animation: fadeIn 0.3s ease; }

    .filters { padding: 0 2rem; border-bottom: 1px solid var(--border); display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; background: var(--bg); }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.06em; padding: 0.7rem 0.9rem; text-transform: uppercase; white-space: nowrap; transition: all 0.2s; margin-bottom: -1px; display: flex; align-items: center; gap: 0.35rem; }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { border-bottom-color: var(--accent); color: var(--accent); }
    .filter-count { font-size: 0.6rem; background: var(--tag-bg); color: var(--dim); padding: 0.1rem 0.35rem; border-radius: 3px; font-weight: 400; }
    .filter-btn.active .filter-count { background: rgba(212,168,67,0.15); color: var(--accent-dim); }

    .main { max-width: 960px; margin: 0 auto; padding: 2rem; }
    .venue-section { margin-bottom: 2.5rem; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .venue-header { display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; margin-bottom: 1rem; }
    .venue-name { font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .venue-name a:hover { color: var(--accent); }
    .event-count { font-size: 0.6rem; color: var(--dim); background: var(--tag-bg); padding: 0.1rem 0.4rem; border-radius: 3px; font-family: monospace; }

    .event-card { display: grid; grid-template-columns: 64px 1fr; gap: 0.75rem; padding: 0.65rem 0; border-bottom: 1px solid var(--border); transition: background 0.15s; cursor: default; }
    .event-card:last-child { border-bottom: none; }
    .event-card:hover { background: var(--hover); margin: 0 -0.5rem; padding-left: 0.5rem; padding-right: 0.5rem; border-radius: 4px; }
    .event-card.no-poster { grid-template-columns: 1fr; }

    .event-poster { width: 64px; flex-shrink: 0; }
    .event-poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; border-radius: 3px; background: var(--tag-bg); }
    .poster-placeholder { width: 100%; aspect-ratio: 2/3; background: var(--tag-bg); border-radius: 3px; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 0.7rem; letter-spacing: 0.05em; overflow: hidden; pointer-events: none; }

    .event-body { display: flex; flex-direction: column; gap: 0.2rem; justify-content: center; min-width: 0; }
    .event-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .event-date { font-size: 0.68rem; color: var(--muted); }
    .event-year { font-size: 0.68rem; color: var(--dim); }
    .event-rating { font-size: 0.68rem; color: var(--accent); font-weight: 500; }
    .event-title { font-size: 0.92rem; line-height: 1.35; font-weight: 500; }
    .event-title a:hover { color: var(--accent); }
    .new-badge { background: var(--accent); color: #fff; font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 0.5rem; margin-left: 0.35rem; vertical-align: middle; font-weight: 600; letter-spacing: 0.03em; }
    .event-overview { font-size: 0.78rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: 0.15rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .event-overview.expanded { -webkit-line-clamp: unset; }
    .event-showtimes { font-size: 0.68rem; color: var(--dim); margin-top: 0.15rem; letter-spacing: 0.02em; }
    .event-also-at { font-size: 0.68rem; color: var(--dim); margin-top: 0.15rem; }
    .event-also-at button { background: none; border: none; border-bottom: 1px dotted var(--dim); color: var(--muted); cursor: pointer; font-family: inherit; font-size: inherit; padding: 0; transition: color 0.15s; }
    .event-also-at button:hover { color: var(--accent); border-bottom-color: var(--accent); }

    .empty { color: var(--muted); text-align: center; padding: 4rem; }
    .empty-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.4; }
    .empty-msg { font-style: italic; font-size: 0.9rem; }
    .empty-hint { font-size: 0.75rem; color: var(--dim); margin-top: 0.4rem; }
    .loading { text-align: center; padding: 4rem; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--dim); font-size: 0.75rem; margin-top: 0.75rem; }

    .back-to-top { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: opacity 0.2s, transform 0.2s, color 0.15s; z-index: 50; -webkit-tap-highlight-color: transparent; }
    .back-to-top:hover { color: var(--accent); border-color: var(--accent-dim); }
    .back-to-top.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }

    footer { border-top: 1px solid var(--border); padding: 1.5rem 2rem; font-size: 0.68rem; color: var(--dim); letter-spacing: 0.03em; text-align: center; }

    .skip-link { position: absolute; left: -9999px; top: auto; width: 1px; height: 1px; overflow: hidden; z-index: 1000; background: var(--bg); color: var(--accent); padding: 0.5rem 1rem; font-size: 0.85rem; }
    .skip-link:focus { position: fixed; left: 0; top: 0; width: auto; height: auto; overflow: visible; }

    @media (max-width: 600px) {
      .header { padding: 1rem; }
      .header h1 { font-size: 1.1rem; }
      .main { padding: 1rem; }
      .filters { padding: 0 1rem; }
      .date-filters { padding: 0.4rem 1rem; }
      .search-bar { padding: 0.5rem 1rem; }
      .event-card { grid-template-columns: 52px 1fr; gap: 0.6rem; padding: 0.75rem 0; }
      .event-poster { width: 52px; }
      .event-overview { -webkit-line-clamp: 3; }
    }
  </style>

<body>
  <script>
    (function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.dataset.theme=t;document.querySelector('meta[name="theme-color"]').setAttribute('content',t==='dark'?'#0a0a0a':'#f5f5f0');})();
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
  </script>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    const ALL = 'all';
    function getHashVenue() { return decodeURIComponent(window.location.hash.slice(1)) || ALL; }
    function setHashVenue(v) { window.history.replaceState(null, '', v === ALL ? '#' : '#' + encodeURIComponent(v)); }

    function useHashVenue() {
      const [venue, setVenue] = useState(getHashVenue);
      useEffect(() => {
        const h = () => setVenue(getHashVenue());
        window.addEventListener('hashchange', h);
        return () => window.removeEventListener('hashchange', h);
      }, []);
      return [venue, useCallback(v => { setHashVenue(v); setVenue(v); }, [])];
    }

    function formatUpdated(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function formatDateStr(dateStr) {
      if (!dateStr) return '';
      const d = parseEventDate(dateStr);
      if (!d || isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    const DATE_FILTERS = [
      { key: 'all', label: 'All Dates' },
      { key: 'today', label: 'Today' },
      { key: 'tomorrow', label: 'Tomorrow' },
      { key: 'weekend', label: 'This Weekend' },
      { key: 'week', label: 'This Week' },
    ];

    const SORT_OPTIONS = [
      { key: 'venue', label: 'Venue' },
      { key: 'date', label: 'Date' },
      { key: 'rating', label: 'Rating' },
    ];

    function parseEventDate(dateStr) {
      if (!dateStr) return null;
      if (/now playing/i.test(dateStr)) return new Date();
      // ISO format: "2026-03-09"
      if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) return new Date(dateStr + 'T12:00:00');
      // Normalize non-breaking spaces
      let s = dateStr.replace(/\u00a0/g, ' ');
      // Strip day-of-week prefix: "Sun, Apr 5" or "Sunday 5, April"
      s = s.replace(/^(?:Sun|Mon|Tue|Wed|Thu|Fri|Sat)\w*,?\s*/i, '');
      // "10, April" → "April 10"
      const dm = s.match(/^(\d{1,2}),?\s+(\w+)$/);
      if (dm) s = dm[2] + ' ' + dm[1];
      // Strip time suffixes: "10PM", "MIDNIGHT", "2 PM", "7:30 PM"
      s = s.replace(/\s+(?:\d{1,2}(?::\d{2})?\s*(?:AM|PM)|MIDNIGHT)$/i, '');
      const now = new Date();
      const attempt = new Date(s + ', ' + now.getFullYear());
      return isNaN(attempt.getTime()) ? null : attempt;
    }

    function toDateKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

    function getDateRange(filterKey) {
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      if (filterKey === 'today') return [toDateKey(today), toDateKey(today)];
      if (filterKey === 'tomorrow') {
        const tom = new Date(today); tom.setDate(tom.getDate() + 1);
        return [toDateKey(tom), toDateKey(tom)];
      }
      if (filterKey === 'weekend') {
        // Find upcoming Sat & Sun (or today if already weekend)
        const day = today.getDay();
        const sat = new Date(today); sat.setDate(sat.getDate() + (6 - day) % 7);
        const sun = new Date(sat); sun.setDate(sun.getDate() + 1);
        // If today is Sunday, show today
        if (day === 0) return [toDateKey(today), toDateKey(today)];
        return [toDateKey(sat), toDateKey(sun)];
      }
      if (filterKey === 'week') {
        const end = new Date(today); end.setDate(end.getDate() + 6);
        return [toDateKey(today), toDateKey(end)];
      }
      return null;
    }

    function matchesDateFilter(event, filterKey) {
      if (filterKey === 'all') return true;
      const range = getDateRange(filterKey);
      if (!range) return true;
      const ed = parseEventDate(event.date_str);
      if (!ed) return filterKey === 'all'; // no date = only show in "all"
      const eKey = toDateKey(ed);
      return eKey >= range[0] && eKey <= range[1];
    }

    function isNewEvent(firstSeen) {
      if (!firstSeen) return false;
      const seen = new Date(firstSeen + 'T12:00:00');
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 7);
      return seen >= cutoff;
    }

    function EventCard({ event, onNavigate, venueName, venueUrl, showNewBadge }) {
      const [expanded, setExpanded] = useState(false);
      const hasPoster = !!event.poster;
      const rating = event.rating ? parseFloat(event.rating.toFixed(1)) : 0;
      return (
        <div className={`event-card ${hasPoster ? '' : 'no-poster'}`} role="article">
          {hasPoster ? (
            <div className="event-poster">
              <img src={event.poster} alt={event.title} loading="lazy" />
            </div>
          ) : (
            <div className="event-poster">
              <div className="poster-placeholder">FILM</div>
            </div>
          )}
          <div className="event-body">
            <div className="event-meta">
              {venueName && <span className="venue-label">{venueUrl ? <a href={venueUrl} target="_blank" rel="noopener">{venueName}</a> : venueName}</span>}
              {event.date_str && <span className="event-date">{formatDateStr(event.date_str)}</span>}
              {event.year && <span className="event-year">({event.year})</span>}
              {rating > 0 && <span className="event-rating">&#9733; {rating.toFixed(1)}</span>}
            </div>
            <div className="event-title">
              {event.link ? <a href={event.link} target="_blank" rel="noopener">{event.title}</a> : event.title}
              {showNewBadge && isNewEvent(event.first_seen) && <span className="new-badge">NEW</span>}
            </div>
            {event.overview && (
              <div className={`event-overview ${expanded ? 'expanded' : ''}`}
                   onClick={() => setExpanded(!expanded)}
                   onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setExpanded(!expanded); } }}
                   tabIndex={0}
                   role="button"
                   aria-expanded={expanded}>
                {event.overview}
              </div>
            )}
            {event.showtimes && event.showtimes.length > 0 && (
              <div className="event-showtimes">{event.showtimes.join(' \u00b7 ')}</div>
            )}
            {event.also_at && event.also_at.length > 0 && (
              <div className="event-also-at">
                Also at:{' '}
                {event.also_at.map((v, i) => (
                  <span key={v}>
                    {i > 0 && ', '}
                    <button onClick={() => onNavigate(v)}>{v}</button>
                  </span>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function VenueSection({ name, vdata, searchFilter, dateFilter, onNavigate, showNewBadge }) {
      const events = (vdata.events || []).filter(e => {
        if (searchFilter && !(e.title.toLowerCase().includes(searchFilter) ||
          (e.overview && e.overview.toLowerCase().includes(searchFilter)))) return false;
        if (!matchesDateFilter(e, dateFilter)) return false;
        return true;
      });
      const url = vdata.url;
      if (!events.length) return null;
      return (
        <div className="venue-section">
          <div className="venue-header">
            <div className="venue-name">
              {url ? <a href={url} target="_blank" rel="noopener">{name}</a> : name}
            </div>
            <span className="event-count">{events.length}</span>
          </div>
          {events.map((e, i) => <EventCard key={i} event={e} onNavigate={onNavigate} showNewBadge={showNewBadge} />)}
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(false);
      const [search, setSearch] = useState('');
      const [dateFilter, setDateFilter] = useState('all');
      const [sortBy, setSortBy] = useState('venue');
      const [activeVenue, navigate] = useHashVenue();
      const [showTop, setShowTop] = useState(false);
      const searchRef = useRef(null);
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');

      useEffect(() => {
        document.documentElement.dataset.theme = theme;
        document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#0a0a0a' : '#f5f5f0');
        localStorage.setItem('theme', theme);
      }, [theme]);

      const toggleTheme = useCallback(() => setTheme(t => t === 'dark' ? 'light' : 'dark'), []);

      useEffect(() => {
        fetch('events.json?t=' + Date.now()).then(r => r.json()).then(setData).catch(() => setError(true));
      }, []);

      useEffect(() => {
        const onScroll = () => setShowTop(window.scrollY > 400);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      useEffect(() => {
        const onKeyDown = (e) => {
          if (e.key === '/' && !e.ctrlKey && !e.metaKey && !e.altKey) {
            const tag = document.activeElement?.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
            if (document.activeElement?.isContentEditable) return;
            e.preventDefault();
            searchRef.current?.focus();
          }
        };
        document.addEventListener('keydown', onKeyDown);
        return () => document.removeEventListener('keydown', onKeyDown);
      }, []);

      const allVenues = data?.venues ? Object.entries(data.venues) : [];
      const venueNames = allVenues.map(([n]) => n);
      const effective = venueNames.includes(activeVenue) ? activeVenue : ALL;
      const filtered = effective === ALL ? allVenues : allVenues.filter(([n]) => n === effective);
      const searchLower = search.toLowerCase().trim();

      const totalEvents = useMemo(() => allVenues.reduce((s, [,v]) => s + (v.events||[]).length, 0), [allVenues]);

      const flatEvents = useMemo(() => {
        if (sortBy === 'venue') return null;
        const events = [];
        filtered.forEach(([name, vdata]) => {
          (vdata.events || []).forEach(e => {
            if (searchLower && !(e.title.toLowerCase().includes(searchLower) ||
              (e.overview && e.overview.toLowerCase().includes(searchLower)))) return;
            if (!matchesDateFilter(e, dateFilter)) return;
            events.push({ ...e, _venueName: name, _venueUrl: vdata.url });
          });
        });
        if (sortBy === 'date') {
          events.sort((a, b) => {
            const da = parseEventDate(a.date_str);
            const db = parseEventDate(b.date_str);
            if (!da && !db) return 0;
            if (!da) return 1;
            if (!db) return -1;
            return da - db;
          });
        } else if (sortBy === 'rating') {
          events.sort((a, b) => {
            const ra = a.rating || 0;
            const rb = b.rating || 0;
            if (!ra && !rb) return 0;
            if (!ra) return 1;
            if (!rb) return -1;
            return rb - ra;
          });
        }
        return events;
      }, [sortBy, filtered, searchLower, dateFilter]);

      const hasVisibleEvents = useMemo(() => {
        if (sortBy !== 'venue' && flatEvents) return flatEvents.length > 0;
        return filtered.some(([, vdata]) =>
          (vdata.events || []).some(e => {
            if (searchLower && !(e.title.toLowerCase().includes(searchLower) ||
              (e.overview && e.overview.toLowerCase().includes(searchLower)))) return false;
            return matchesDateFilter(e, dateFilter);
          })
        );
      }, [filtered, searchLower, dateFilter, sortBy, flatEvents]);

      const venueCounts = useMemo(() => {
        const c = {};
        allVenues.forEach(([n, v]) => { c[n] = (v.events||[]).length; });
        return c;
      }, [allVenues]);

      // Suppress NEW badge globally if the signal is meaningless: when more
      // than 30% of events would qualify, the dataset isn't differentiating
      // recent additions from routine listings (e.g., right after the scraper
      // state was reset). Self-heals as state retention accumulates.
      const showNewBadge = useMemo(() => {
        if (!totalEvents) return false;
        let n = 0;
        allVenues.forEach(([, v]) => {
          (v.events || []).forEach(e => { if (isNewEvent(e.first_seen)) n++; });
        });
        return n > 0 && n / totalEvents <= 0.3;
      }, [allVenues, totalEvents]);

      const handleNavigate = useCallback((v) => {
        navigate(v);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, [navigate]);

      return (
        <>
          <a className="skip-link" href="#main-content">Skip to main content</a>
          <header className="header" role="banner">
            <h1>NYC Film Events</h1>
            <div className="header-right">
              {data && <span className="updated">Updated {formatUpdated(data.updated)}</span>}
              <button className="theme-toggle" onClick={toggleTheme} aria-label="Toggle theme">{theme === 'dark' ? '☀️' : '🌙'}</button>
            </div>
          </header>

          <div className="sticky-nav">
            <div className="search-bar" role="search">
              <span className="search-icon">&#8981;</span>
              <input ref={searchRef} className="search-input" type="text" placeholder="Search films..." value={search} onChange={e => setSearch(e.target.value)} aria-label="Search films" />
              {search && (
                <button className="search-clear" onClick={() => { setSearch(''); searchRef.current?.focus(); }} aria-label="Clear search">&times;</button>
              )}
            </div>

            <div className="date-filters">
              <div className="date-pills">
                {DATE_FILTERS.map(f => (
                  <button key={f.key} className={`date-pill ${dateFilter === f.key ? 'active' : ''}`}
                    onClick={() => setDateFilter(f.key)} aria-pressed={dateFilter === f.key}>{f.label}</button>
                ))}
              </div>
              <div className="sort-group">
                <span className="sort-label">Sort</span>
                {SORT_OPTIONS.map(s => (
                  <button key={s.key} className={`date-pill ${sortBy === s.key ? 'active' : ''}`}
                    onClick={() => setSortBy(s.key)} aria-pressed={sortBy === s.key}>{s.label}</button>
                ))}
              </div>
            </div>

            {allVenues.length > 0 && (
              <nav className="filters" role="navigation">
                <button className={`filter-btn ${effective === ALL ? 'active' : ''}`}
                  onClick={() => handleNavigate(ALL)} aria-pressed={effective === ALL}>All <span className="filter-count">{totalEvents}</span></button>
                {venueNames.map(name => (
                  <button key={name} className={`filter-btn ${effective === name ? 'active' : ''}`}
                    onClick={() => handleNavigate(name)} aria-pressed={effective === name}>{name} <span className="filter-count">{venueCounts[name]||0}</span></button>
                ))}
              </nav>
            )}
          </div>

          <main className="main" id="main-content" role="main">
            {error && <p className="empty">Failed to load events.</p>}
            {!data && !error && (
              <div className="loading">
                <div className="spinner"></div>
                <div className="loading-text">Loading screenings&hellip;</div>
              </div>
            )}
            {data && (filtered.length === 0 || !hasVisibleEvents) && (
              <div className="empty">
                <div className="empty-icon">🎬</div>
                <div className="empty-msg">No screenings found</div>
                <div className="empty-hint">
                  {searchLower ? 'Try a different search term' : dateFilter !== 'all' ? 'No events in this date range — try "All Dates"' : 'Try a different filter'}
                </div>
              </div>
            )}
            {sortBy === 'venue' ? (
              filtered.map(([name, vdata]) =>
                <VenueSection key={name} name={name} vdata={vdata} searchFilter={searchLower || null} dateFilter={dateFilter} onNavigate={handleNavigate} showNewBadge={showNewBadge} />
              )
            ) : (
              flatEvents && flatEvents.length > 0 && (
                <div className="flat-events">
                  {flatEvents.map((e, i) => <EventCard key={i} event={e} venueName={e._venueName} venueUrl={e._venueUrl} onNavigate={handleNavigate} showNewBadge={showNewBadge} />)}
                </div>
              )
            )}
          </main>

          <button
            className={`back-to-top ${showTop ? '' : 'hidden'}`}
            onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
            aria-label="Back to top"
          >&#8593;</button>

          <footer role="contentinfo">
            Curated from NYC's finest arthouse cinemas &middot; Updated automatically
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
