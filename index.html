<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Film Events</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0c0c0c; --surface: #141414; --border: #242424;
      --text: #e2e2e2; --muted: #777; --accent: #c8a96e; --accent-dim: #8a7248;
      --tag-bg: #1e1e1e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Georgia', 'Times New Roman', serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: var(--accent); }

    .header { border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .header h1 { font-size: 1rem; font-weight: normal; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
    .updated { font-size: 0.72rem; color: var(--muted); font-family: 'Courier New', monospace; }

    .filters { padding: 0 2rem; border-bottom: 1px solid var(--border); display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-family: 'Courier New', monospace; font-size: 0.68rem; letter-spacing: 0.1em; padding: 0.75rem 1rem; text-transform: uppercase; white-space: nowrap; transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

    .main { max-width: 960px; margin: 0 auto; padding: 2rem; }
    .venue-section { margin-bottom: 3rem; }
    .venue-header { display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.6rem; margin-bottom: 1.25rem; }
    .venue-name { font-family: 'Courier New', monospace; font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .venue-name a:hover { color: var(--accent); }
    .event-count { font-family: 'Courier New', monospace; font-size: 0.62rem; color: var(--border); background: var(--tag-bg); padding: 0.1rem 0.4rem; border-radius: 2px; }

    .event-card { display: grid; grid-template-columns: 80px 1fr; border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .event-card:last-child { border-bottom: none; }
    .event-card:hover { background: var(--surface); }
    .event-card.no-poster { grid-template-columns: 1fr; }

    .event-poster { width: 80px; padding: 0.75rem 0.75rem 0.75rem 0; flex-shrink: 0; }
    .event-poster img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; border-radius: 2px; background: var(--tag-bg); }
    .poster-placeholder { width: 100%; aspect-ratio: 2/3; background: var(--tag-bg); border-radius: 2px; }

    .event-body { padding: 0.75rem 0; display: flex; flex-direction: column; gap: 0.3rem; }
    .event-card.no-poster .event-body { padding: 0.6rem 0; }
    .event-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .event-date { font-family: 'Courier New', monospace; font-size: 0.68rem; color: var(--muted); }
    .event-year { font-family: 'Courier New', monospace; font-size: 0.68rem; color: var(--border); }
    .event-rating { font-family: 'Courier New', monospace; font-size: 0.68rem; color: var(--accent-dim); }
    .event-title { font-size: 0.95rem; line-height: 1.3; }
    .event-title a:hover { color: var(--accent); }
    .event-overview { font-size: 0.8rem; color: var(--muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .empty { color: var(--muted); font-style: italic; text-align: center; padding: 4rem; }
    .loading { color: var(--muted); text-align: center; padding: 4rem; font-family: monospace; font-size: 0.8rem; }
    footer { border-top: 1px solid var(--border); padding: 1.25rem 2rem; font-family: 'Courier New', monospace; font-size: 0.68rem; color: var(--border); letter-spacing: 0.05em; }
    @media (max-width: 600px) { .header, .main { padding: 1rem; } .filters { padding: 0 1rem; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Routing helpers ──────────────────────────────────────────────────────
    // Venue selection lives in the hash: #Metrograph, #all, etc.
    const ALL = 'all';

    function getHashVenue() {
      const raw = window.location.hash.slice(1); // strip '#'
      return decodeURIComponent(raw) || ALL;
    }

    function setHashVenue(venue) {
      const next = venue === ALL ? '#' : '#' + encodeURIComponent(venue);
      // Use replaceState so back-button skips within-page filter changes
      window.history.replaceState(null, '', next);
    }

    function useHashVenue() {
      const [venue, setVenue] = useState(getHashVenue);

      // Sync to hash on external change (back/forward)
      useEffect(() => {
        const onHashChange = () => setVenue(getHashVenue());
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);

      const navigate = useCallback((v) => {
        setHashVenue(v);
        setVenue(v);
      }, []);

      return [venue, navigate];
    }
    // ────────────────────────────────────────────────────────────────────────

    function formatUpdated(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
    }

    function EventCard({ event }) {
      const hasPoster = !!event.poster;
      return (
        <div className={`event-card ${hasPoster ? '' : 'no-poster'}`}>
          {hasPoster && (
            <div className="event-poster">
              <img src={event.poster} alt={event.title} loading="lazy" />
            </div>
          )}
          <div className="event-body">
            <div className="event-meta">
              {event.date_str && <span className="event-date">{event.date_str}</span>}
              {event.year    && <span className="event-year">{event.year}</span>}
              {event.rating  && <span className="event-rating">★ {event.rating.toFixed(1)}</span>}
            </div>
            <div className="event-title">
              {event.link
                ? <a href={event.link} target="_blank" rel="noopener">{event.title}</a>
                : event.title}
            </div>
            {event.overview && <div className="event-overview">{event.overview}</div>}
          </div>
        </div>
      );
    }

    function VenueSection({ name, vdata }) {
      const events = Array.isArray(vdata) ? vdata : (vdata.events || []);
      const url    = Array.isArray(vdata) ? null  : vdata.url;
      if (!events.length) return null;
      return (
        <div className="venue-section">
          <div className="venue-header">
            <div className="venue-name">
              {url ? <a href={url} target="_blank" rel="noopener">{name}</a> : name}
            </div>
            <span className="event-count">{events.length}</span>
          </div>
          <div className="events-grid">
            {events.map((e, i) => <EventCard key={i} event={e} />)}
          </div>
        </div>
      );
    }

    function App() {
      const [data,  setData]  = useState(null);
      const [error, setError] = useState(false);
      const [activeVenue, navigate] = useHashVenue();

      useEffect(() => {
        fetch('events.json?t=' + Date.now())
          .then(r => r.json())
          .then(setData)
          .catch(() => setError(true));
      }, []);

      const allVenues = data?.venues ? Object.entries(data.venues) : [];
      const venueNames = allVenues.map(([name]) => name);

      // Normalise active venue: if hash refers to unknown venue, fall back to all
      const activeIsValid = activeVenue === ALL || venueNames.includes(activeVenue);
      const effectiveVenue = activeIsValid ? activeVenue : ALL;

      const filtered = effectiveVenue === ALL
        ? allVenues
        : allVenues.filter(([name]) => name === effectiveVenue);

      return (
        <>
          <header className="header">
            <h1>🎬 NYC Film Events</h1>
            {data && <span className="updated">Updated {formatUpdated(data.updated)}</span>}
          </header>

          {allVenues.length > 0 && (
            <nav className="filters" aria-label="Filter by venue">
              <button className={`filter-btn ${effectiveVenue === ALL ? 'active' : ''}`}
                onClick={() => navigate(ALL)}>All</button>
              {venueNames.map(name => (
                <button key={name}
                  className={`filter-btn ${effectiveVenue === name ? 'active' : ''}`}
                  onClick={() => navigate(name)}>{name}</button>
              ))}
            </nav>
          )}

          <main className="main">
            {error  && <p className="empty">Failed to load events.</p>}
            {!data && !error && <p className="loading">Loading…</p>}
            {data && filtered.length === 0 && <p className="empty">No events found.</p>}
            {filtered.map(([name, vdata]) =>
              <VenueSection key={name} name={name} vdata={vdata} />
            )}
          </main>

          <footer>
            Metrograph · Film Forum · IFC Center · Film at Lincoln Center · Anthology · MoMI · MoMA · Nitehawk · Spectacle · Syndicated BK · BAM
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
